services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:16-alpine
    container_name: ai-factory-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${DB_USER:-ai-camera}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ai-camera}
      POSTGRES_DB: ${DB_NAME:-aiPostgres}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/migrations:/docker-entrypoint-initdb.d

    ports:
      - "${DB_PORT:-5443}:5432"

    healthcheck:
      test:
        [
          "CMD",
          "pg_isready",
          "-h",
          "postgres",
          "-U",
          "${DB_USER:-ai-camera}",
          "-d",
          "${DB_NAME:-aiPostgres}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    networks:
      - factory-network

    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: ai-factory-backend
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      NODE_ENV: production
      PORT: 8085
      DB_USER: ${DB_USER:-ai-camera}
      DB_PASSWORD: ${DB_PASSWORD:-ai-camera}
      DB_NAME: ${DB_NAME:-aiPostgres}
      DATABASE_URL: postgresql://${DB_USER:-ai-camera}:${DB_PASSWORD:-ai-camera}@postgres:5432/${DB_NAME:-aiPostgres}

    ports:
      - "${BACKEND_PORT:-8085}:8085"

    volumes:
      - backend_logs:/app/logs

    # ✅ FIXED: was using wget which is not available in bun image
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    networks:
      - factory-network

    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    container_name: ai-factory-frontend
    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy

    environment:
      NODE_ENV: production
      PORT: 3000
      VITE_API_URL: http://backend:8085

    ports:
      - "${FRONTEND_PORT:-3000}:3000"

    # ✅ FIXED: was using wget which is not available in bun image
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    networks:
      - factory-network

    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

volumes:
  postgres_data:
    driver: local
  backend_logs:
    driver: local

networks:
  factory-network:
    driver: bridge
