version: "3.9"

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:16-alpine
    container_name: ai-factory-db
    restart: unless-stopped

    # Environment variables for PostgreSQL
    environment:
      POSTGRES_USER: ${DB_USER:-ai-camera}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ai-camera}
      POSTGRES_DB: ${DB_NAME:-aiPostgres}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"

    # Volume for data persistence
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/migrations:/docker-entrypoint-initdb.d

    # Port mapping
    ports:
      - "${DB_PORT:-5443}:5432"

    # Health check
    healthcheck:
      test:
        [
          "CMD",
          "pg_isready",
          "-h",
          "postgres",
          "-U",
          "${DB_USER:-ai-camera}",
          "-d",
          "${DB_NAME:-aiPostgres}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    # Network
    networks:
      - factory-network

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: ai-factory-backend
    restart: unless-stopped

    # Depends on database
    depends_on:
      postgres:
        condition: service_healthy

    # Environment variables
    environment:
      NODE_ENV: production
      PORT: 8085
      DB_USER: ${DB_USER:-ai-camera}
      DB_PASSWORD: ${DB_PASSWORD:-ai-camera}
      DB_NAME: ${DB_NAME:-aiPostgres}
      DATABASE_URL: postgresql://${DB_USER:-ai-camera}:${DB_PASSWORD:-ai-camera}@postgres:5432/${DB_NAME:-aiPostgres}

    # Port mapping
    ports:
      - "${BACKEND_PORT:-8085}:8085"

    # Volume for logs (optional)
    volumes:
      - backend_logs:/app/logs

    # Health check
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8085/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Network
    networks:
      - factory-network

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    container_name: ai-factory-frontend
    restart: unless-stopped

    # Depends on backend
    depends_on:
      backend:
        condition: service_healthy

    # Environment variables
    environment:
      NODE_ENV: production
      PORT: 3000
      VITE_API_URL: http://backend:8085

    # Port mapping
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

    # Health check
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3000/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Network
    networks:
      - factory-network

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

# Named volumes for data persistence
volumes:
  postgres_data:
    driver: local
  backend_logs:
    driver: local

# Network for service communication
networks:
  factory-network:
    driver: bridge
